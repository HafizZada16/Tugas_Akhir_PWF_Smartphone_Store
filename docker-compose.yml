version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: e-commerce-hp:latest
    ports:
      - "8000:8000"
    environment:
      # Kita menimpa setting .env di sini khusus untuk Docker
      - DB_HOST=mysql
      - DB_CONNECTION=mysql
      - DB_DATABASE=tugas_akhir_pwf
      - DB_USERNAME=sail
      - DB_PASSWORD=password
    depends_on:
      - mysql
    networks:
      - sail

  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      - "33066:3306" # Mengekspos ke port 33066 di Windows agar tidak bentrok dengan Laragon
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: tugas_akhir_pwf
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
    networks:
      - sail

networks:
  sail:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
