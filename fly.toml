# fly.toml app configuration file generated for tugas-akhir-pwf-smartphone-store on 2026-06-06T06:02:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "tugas-akhir-pwf-smartphone-store"
primary_region = "sin"

[env]
  PORT = "8080"
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  SESSION_DRIVER = "cookie"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'
  memory_mb = 1024
  processes = ['app']
  size = 'shared-cpu-1x'
